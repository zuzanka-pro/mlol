    :root {

      --off-white: #f0ece5;
      --gold: #ddc99a;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      color: var(--off-white);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;

    }
    body::after {

      position: fixed; inset: 0;

      pointer-events: none; z-index: -1;
    }
    nav {

      display: flex; justify-content: space-between; align-items: center;

      padding: 60px 48px;
      position: relative;
      min-height: 50vh;
    }
    .hero-ghost {
      position: absolute;
      font-family: 'EB Garamond', serif;
      font-size: clamp(160px, 26vw, 340px);
      font-weight: 500;
      color: transparent;
      -webkit-text-stroke: 1px rgba(221,201,154,0.04);
      user-select: none; pointer-events: none;
      letter-spacing: 0.08em;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }
    .top-ornament { font-size: 16px; letter-spacing: 0.5em; color: var(--gold); margin-bottom: 32px; opacity: 0.45; }
    .meller-sign {
      font-family: 'EB Garamond', serif;
      font-size: clamp(80px, 15vw, 190px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--off-white);
      cursor: pointer;
      user-select: none;
      line-height: 1;
      transition: opacity 0.25s ease;
    }
    .meller-sign:hover { opacity: 0.7; }
    .meller-sign:active { opacity: 0.35; }
    .bottom-ornament { margin-top: 32px; display: flex; align-items: center; gap: 20px; color: var(--gold); font-size: 14px; opacity: 0.4; }
    .bottom-ornament span { display: inline-block; width: 40px; height: 1px; background: var(--rule); }

    /* JOKE BOX */
    .joke-section {
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      padding: 56px 10vw;
      text-align: center;
      position: relative;
      min-height: 160px;
      display: flex; align-items: center; justify-content: center;
    }
    .quote-corner { position: absolute; font-size: 32px; color: var(--gold); opacity: 0.15; line-height: 1; }
    .quote-corner.tl { top: 18px; left: 30px; }
    .quote-corner.br { bottom: 18px; right: 30px; transform: scaleX(-1); }

    #jokeText {
      font-family: 'EB Garamond', serif;
      font-size: clamp(20px, 3vw, 32px);
      font-style: italic;
      line-height: 1.6;
      color: var(--off-white);
    }
    #jokeCounter {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim);
    }

    /* ANSWER SECTION */
    .answer-section {
      padding: 64px 52px 80px;
      max-width: 680px;
      margin: 0 auto;
    }
    .answer-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 28px; }
    .answer-glyph { color: var(--gold); font-size: 18px; opacity: 0.7; }
    .answer-heading { font-family: 'EB Garamond', serif; font-size: clamp(28px, 4vw, 42px); font-weight: 400; font-style: italic; }

    #inputRow {
      display: flex; align-items: stretch;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      transition: border-color 0.25s;
      margin-bottom: 16px;
    }
    #inputRow:focus-within { border-color: var(--gold); }
    #answerInput {
      flex: 1; background: transparent; border: none; outline: none;
      padding: 16px 0;
      font-family: 'EB Garamond', serif; font-size: 22px; font-style: italic;
      color: var(--off-white);
    }
    #answerInput::placeholder { color: var(--dim); }
    #submitBtn {
      background: none; border: none; color: var(--gold); font-size: 18px;
      cursor: pointer; padding: 0 4px 0 16px; opacity: 0.7;
      transition: opacity 0.2s, transform 0.2s;
    }
    #submitBtn:hover { opacity: 1; transform: translateX(3px); }

    #feedback { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; min-height: 18px; color: #c48a8a; }
    #chujBtn {
      margin-top: 8px;
      background: none;
      border: 1px solid rgba(221,201,154,0.2);
      color: rgba(221,201,154,0.4);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #chujBtn:hover { border-color: rgba(221,201,154,0.7); color: rgba(221,201,154,0.9); }

    /* DANCING REVEAL */
    @keyframes dance {
      0%   { transform: rotate(-4deg) scale(1.02) translateY(0px); }
      15%  { transform: rotate(6deg) scale(1.06) translateY(-8px); }
      30%  { transform: rotate(-7deg) scale(0.97) translateY(4px); }
      45%  { transform: rotate(8deg) scale(1.07) translateY(-10px); }
      60%  { transform: rotate(-5deg) scale(1.03) translateY(3px); }
      75%  { transform: rotate(7deg) scale(1.05) translateY(-6px); }
      100% { transform: rotate(-4deg) scale(1.02) translateY(0px); }
    }
    @keyframes colorshift {
      0%   { color: #f0ece5; }
      25%  { color: #ddc99a; }
      50%  { color: #a8d8a8; }
      75%  { color: #d4a8d4; }
      100% { color: #f0ece5; }
    }
    #lolText {
      display: none;
      font-family: 'EB Garamond', serif;
      font-size: clamp(60px, 12vw, 120px);
      font-weight: 400;
      text-align: center;
      letter-spacing: 0.15em;
      color: var(--gold);
      animation: dance 0.4s ease-in-out infinite, colorshift 1s linear infinite;
      transform-origin: center;
      margin-bottom: 16px;
    }
    #revealText {
      display: none;
      font-family: 'EB Garamond', serif;
      font-size: clamp(20px, 3vw, 32px);
      font-style: italic; line-height: 1.6;
      text-align: center;
      animation: dance 0.5s ease-in-out infinite, colorshift 1.2s linear infinite;
      transform-origin: center;
      margin-top: 8px;
    }

    #completionScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 500;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    #completionScreen.show {
      display: flex;
    }
    #completionTitle {
      font-family: 'EB Garamond', serif;
      font-size: clamp(32px, 7vw, 90px);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-align: center;
      padding: 0 40px;
      animation: dance 0.5s ease-in-out infinite, colorshift 1.2s linear infinite;
      transform-origin: center;
    }
    #completionLol {
      font-family: 'EB Garamond', serif;
      font-size: clamp(60px, 14vw, 160px);
      font-weight: 400;
      letter-spacing: 0.15em;
      animation: dance 0.35s ease-in-out infinite, colorshift 0.9s linear infinite;
      transform-origin: center;
      animation-delay: 0.1s;
    }
    footer {
      border-top: 1px solid var(--rule);
      padding: 22px 52px;
      display: flex; justify-content: space-between; align-items: center;
    }
    footer span { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(221,201,154,0.2); }

    @media (max-width: 600px) {
      nav, #completionScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 500;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

      display: flex;
    }
    #completionTitle {
      font-family: 'EB Garamond', serif;

      text-align: center;

      letter-spacing: 0.15em;
      animation: dance 0.35s ease-in-out infinite, colorshift 0.9s linear infinite;
      transform-origin: center;
      animation-delay: 0.1s;
    }
    footer { padding: 20px 24px; }
      .hero, .answer-section { padding-left: 24px; padding-right: 24px; }
      .joke-section { padding: 48px 24px; }
    }
  </style>
</head>

let current = null;
let used = [];

const sign        = document.getElementById('mellerSign');
const jokeText    = document.getElementById('jokeText');
const jokeCounter = document.getElementById('jokeCounter');
const inputRow    = document.getElementById('inputRow');
const answerInput = document.getElementById('answerInput');
const submitBtn   = document.getElementById('submitBtn');
const feedback    = document.getElementById('feedback');
const revealText  = document.getElementById('revealText');

sign.addEventListener('click', function() {
  if (used.length === jokes.length) {
    document.getElementById('completionScreen').classList.add('show');
    return;
  }
  let idx;
  do { idx = Math.floor(Math.random() * jokes.length); } while (used.includes(idx));
  used.push(idx);
  current = jokes[idx];

  jokeText.textContent = current.m;
  jokeCounter.textContent = used.length + ' / ' + jokes.length;

  answerInput.value = '';
  answerInput.disabled = false;
  feedback.textContent = '';
  inputRow.style.display = 'flex';
  revealText.style.display = 'none';
  revealText.textContent = '';
  document.getElementById('lolText').style.display = 'none';
  document.getElementById('lolText').textContent = '';
});

function check() {
  if (!current) return;
  var val = answerInput.value.trim().toLowerCase();
  if (!val) return;

  if (val === current.w.toLowerCase()) {
    inputRow.style.display = 'none';
    feedback.textContent = '';
    document.getElementById('lolText').textContent = 'LOL';
    document.getElementById('lolText').style.display = 'block';
    revealText.textContent = current.a;
    revealText.style.display = 'block';
  } else {
    feedback.textContent = '※  Not quite — try again';
  }
}

submitBtn.addEventListener('click', check);
answerInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') check();
});

document.getElementById('chujBtn').addEventListener('click', function() {
  if (!current) return;
  inputRow.style.display = 'none';
  feedback.textContent = '';
  document.getElementById('lolText').textContent = 'LOL';
  document.getElementById('lolText').style.display = 'block';
  revealText.textContent = current.a;
  revealText.style.display = 'block';
});
</script>
